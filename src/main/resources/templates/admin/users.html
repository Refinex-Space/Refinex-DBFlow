<!doctype html>
<html lang="zh-CN" th:replace="~{admin/fragments/layout :: layout('用户管理', 'users', ${routeHint}, ~{::section})}"
      xmlns:th="http://www.thymeleaf.org">
<body>
<section>
    <div class="page-head">
        <div><h1>用户管理</h1>
            <p class="muted">管理后台用户及其 Token、环境授权关系。</p></div>
    </div>
    <div class="notice ok" th:if="${successMessage}" th:text="${successMessage}">操作成功</div>
    <div class="notice bad" th:if="${errorMessage}" th:text="${errorMessage}">操作失败</div>
    <div class="panel">
        <div class="panel-head"><h2>创建用户</h2><span
                class="muted">密码仅以不可逆摘要入库，页面不展示敏感凭据字段。</span></div>
        <form class="filter-bar compact" method="post" th:action="@{/admin/users}">
            <div class="field"><label>用户名</label><input class="control" name="username" placeholder="ops.alice"
                                                           required></div>
            <div class="field"><label>显示名</label><input class="control" name="displayName" placeholder="Ops Alice"
                                                           required></div>
            <div class="field"><label>管理端密码</label><input autocomplete="new-password" class="control" name="password"
                                                               placeholder="可为空，仅创建 MCP 用户"
                                                               type="password"></div>
            <div class="field"><label>角色</label><input class="control" disabled value="ADMIN_SESSION"></div>
            <button class="btn primary" type="submit">创建用户</button>
        </form>
    </div>
    <div class="panel">
        <form class="filter-bar compact" method="get">
            <div class="field"><label>用户名</label><input class="control" name="username" placeholder="zhang / chen"
                                                           th:value="${param.username}"></div>
            <div class="field"><label>状态</label><select class="select" name="status">
                <option>全部</option>
                <option>ACTIVE</option>
                <option>DISABLED</option>
            </select></div>
            <div class="field"><label>角色</label><select class="select" disabled name="role">
                <option>ADMIN_SESSION</option>
            </select></div>
            <div class="field"><label>最近使用</label><select class="select" disabled name="lastUsed">
                <option>由审计统计补齐</option>
            </select></div>
            <button class="btn primary" type="submit">筛选</button>
        </form>
        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>用户 ID</th>
                    <th>用户名</th>
                    <th>显示名</th>
                    <th>角色</th>
                    <th>状态</th>
                    <th>授权环境</th>
                    <th>有效 Token</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="row : ${users}">
                    <td class="mono" th:text="${row.id}">1001</td>
                    <td th:text="${row.username}">admin.refinex</td>
                    <td th:text="${row.displayName}">平台管理员</td>
                    <td th:text="${row.role}">ADMIN_SESSION</td>
                    <td><span th:class="'status ' + (${row.status == 'ACTIVE'} ? 'ok' : 'neutral')"
                              th:text="${row.status}">ACTIVE</span></td>
                    <td th:text="${row.grantCount}">6</td>
                    <td th:text="${row.activeTokenCount}">1</td>
                    <td>
                        <div class="actions">
                            <a class="btn text" th:href="@{/admin/grants(username=${row.username})}">授权</a>
                            <form class="inline-form" method="post"
                                  th:action="@{/admin/users/{userId}/disable(userId=${row.id})}" th:if="${row.status == 'ACTIVE'}">
                                <button class="btn text danger-text" type="submit">禁用</button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(users)}">
                    <td class="muted" colspan="8">当前筛选条件下没有用户。</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</body>
</html>
