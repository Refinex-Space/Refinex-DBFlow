# Spring Boot 应用基础配置。
spring:
  # 应用名称用于日志、Actuator 和后续注册发现标识。
  application:
    name: refinex-dbflow
  # 默认本地配置不连接 Nacos，避免开发和测试依赖外部配置中心或注册中心。
  cloud:
    service-registry:
      auto-registration:
        enabled: false
    nacos:
      config:
        enabled: false
      discovery:
        enabled: false
  # 本地元数据库占位配置：P02 阶段使用 H2 MySQL mode 验证 Flyway schema，生产凭据后续由安全配置注入。
  datasource:
    url: jdbc:h2:mem:dbflow_metadata;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  # JPA 当前只消费 Flyway 管理后的 schema，不允许 Hibernate 自动建表或改表。
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  # Flyway 默认读取 classpath:db/migration，本处显式记录元数据库迁移入口。
  flyway:
    locations: classpath:db/migration
  # Spring AI MCP Server 配置：当前阶段只启用 Streamable HTTP 和最小 smoke tool，不包含数据库执行能力。
  ai:
    mcp:
      server:
        enabled: true
        name: refinex-dbflow
        version: 0.1.0-SNAPSHOT
        type: SYNC
        protocol: STREAMABLE
        instructions: Refinex-DBFlow MCP server exposes guarded database operation capabilities in later phases.
        capabilities:
          tool: true
          resource: true
          prompt: true
        streamable-http:
          mcp-endpoint: /mcp

# Actuator 默认仅暴露健康与指标端点，健康详情不向匿名调用者公开。
management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      show-details: never
  metrics:
    tags:
      application: ${spring.application.name}

# DBFlow 默认配置只服务本地首次启动。target datasource、危险策略和生产密钥应来自外部
# config/application-dbflow.yml、Nacos dataId refinex-dbflow-nacos.yml，或密钥系统；示例见 docs/deployment/。
dbflow:
  # 本地默认 profile 只提供首次登录账号：admin / admin；部署配置仍以 Nacos 或外部 YAML 为准。
  admin:
    initial-user:
      enabled: true
      username: admin
      display-name: DBFlow Administrator
      password: admin
  security:
    mcp-token:
      pepper: dev-only-change-me
