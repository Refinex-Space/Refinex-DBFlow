<!doctype html>
<html lang="zh-CN" th:replace="~{admin/fragments/layout :: layout('总览', 'overview', ${routeHint}, ~{::section})}"
      xmlns:th="http://www.thymeleaf.org">
<body>
<section>
    <div class="page-head">
        <div><h1>总览</h1>
            <p class="muted" th:text="${overview.windowLabel}">最近 24 小时网关安全、执行和健康摘要。</p></div>
        <div class="actions">
            <select class="select">
                <option th:each="option : ${overview.environmentOptions}" th:text="${option.label}"
                        th:value="${option.value}">全部环境
                </option>
            </select>
            <a class="btn btn-icon" th:href="@{/admin}" aria-label="刷新" title="刷新">
                <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10"/><path d="M20.49 15a9 9 0 0 1-14.85 3.36L1 14"/></svg>
            </a>
        </div>
    </div>
    <div class="metric-grid">
        <div class="metric" th:each="metric : ${overview.metrics}">
            <div class="label" th:text="${metric.label}">SQL 请求</div>
            <div class="value"
                 th:classappend="${metric.tone == 'bad'} ? ' danger-text' : (${metric.tone == 'warn'} ? ' warn-text' : '')"
                 th:text="${metric.value}">128
            </div>
            <div class="hint" th:text="${metric.hint}">含 explain / inspect</div>
        </div>
    </div>
    <div class="split">
        <div class="panel">
            <div class="panel-head"><h2>最近审计事件</h2><a class="btn text" th:href="@{/admin/audit}">查看全部</a>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th>时间</th>
                        <th>用户</th>
                        <th>项目/环境</th>
                        <th>Risk</th>
                        <th>Decision</th>
                        <th>SQL Hash</th>
                        <th></th>
                    </tr>
                    </thead>
                    <tbody th:if="${!overview.recentAuditRows.isEmpty()}">
                    <tr th:each="row : ${overview.recentAuditRows}">
                        <td class="mono" th:text="${#strings.substring(row.time, 11)}">15:45:12</td>
                        <td th:text="${row.user}">user</td>
                        <td th:text="${row.project + '/' + row.env}">project/env</td>
                        <td><span th:class="'status ' + ${row.riskTone}" th:text="${row.risk}">LOW</span></td>
                        <td><span th:class="'status ' + ${row.decisionTone}" th:text="${row.decision}">EXECUTED</span>
                        </td>
                        <td class="mono" th:text="${row.sqlHash}">sha256:</td>
                        <td><a class="btn text" th:href="@{/admin/audit/{id}(id=${row.id})}">详情</a></td>
                    </tr>
                    </tbody>
                    <tbody th:if="${overview.recentAuditRows.isEmpty()}">
                    <tr>
                        <td colspan="7">当前暂无审计事件。</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="panel">
            <div class="panel-head"><h2>需要关注</h2><a class="btn text"
                                                        th:href="@{/admin/policies/dangerous}">危险策略</a></div>
            <div class="panel-body small-list" th:if="${!overview.attentionItems.isEmpty()}">
                <div class="small-row" th:each="item : ${overview.attentionItems}">
                    <span th:text="${item.label}">DROP TABLE 被拒绝</span>
                    <a th:href="${item.href}"><span th:class="'decision ' + ${item.tone}" th:text="${item.status}">POLICY_DENIED</span></a>
                </div>
            </div>
            <div class="panel-body small-list" th:if="${overview.attentionItems.isEmpty()}">
                <div class="small-row"><span>当前无需要关注的运行时事项。</span><span class="decision ok">OK</span></div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
