<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>登录 · Refinex-DBFlow Admin</title>
    <link href="data:," rel="icon">
    <link rel="stylesheet" th:href="@{/admin-assets/css/admin.css}">
    <script defer th:src="@{/admin-assets/js/admin.js}"></script>
</head>
<body>
<section class="login-view">
    <div class="login-box">
        <div class="login-head">
            <div class="brand-line"><span class="brand-mark">DB</span><span>Refinex-DBFlow Admin</span></div>
            <p class="muted" style="margin-top:8px">内部 MySQL MCP 操作网关管理端</p>
        </div>
        <form class="login-body" method="post" th:action="@{/login}">
            <div class="notice" style="margin-bottom:14px" th:if="${param.logout}">已退出管理端。</div>
            <div class="notice" style="margin-bottom:14px" th:if="${param.error}">用户名或密码错误，或账号已停用。</div>
            <div class="notice" style="margin-bottom:14px" th:unless="${param.error != null || param.logout != null}">
                会话已过期或首次进入，请使用管理端账号登录。
            </div>
            <div class="field">
                <label for="username">用户名</label>
                <input autocomplete="username" autofocus class="control" id="username" name="username">
            </div>
            <div class="field">
                <label for="password">密码</label>
                <div style="display:grid;grid-template-columns:1fr 74px;gap:8px">
                    <input autocomplete="current-password" class="control" id="password" name="password"
                           type="password">
                    <button class="btn" data-password-toggle="#password" type="button">显示</button>
                </div>
            </div>
            <button class="btn primary" style="width:100%" type="submit">登录后台</button>
        </form>
    </div>
</section>
</body>
</html>
