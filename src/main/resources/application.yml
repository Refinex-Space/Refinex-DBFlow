# Spring Boot 应用基础配置。
# 运行配置默认由 Nacos Data ID 提供；不要在 jar 内维护管理员密码、Token pepper、target datasource 或危险策略。
spring:
  # 应用名称用于日志、Actuator、指标标签和 Nacos Discovery 服务名。
  application:
    name: refinex-dbflow
  config:
    # 默认启动即按 Nacos 方式装载配置；当前只约定一个可复制 Data ID：application-dbflow.yml。
    # optional 只避免本地缺少 Data ID 时提前中断；实际部署仍应通过健康检查保证 Nacos 可用。
    import:
      - optional:nacos:application-dbflow.yml?group=DBFLOW_GROUP&refreshEnabled=true
  cloud:
    service-registry:
      auto-registration:
        enabled: true
    nacos:
      # Nacos 地址、用户名、密码全部来自环境变量或外部安全配置，仓库不提供真实默认凭据。
      server-addr: ${DBFLOW_NACOS_SERVER_ADDR:127.0.0.1:8848}
      username: ${DBFLOW_NACOS_USERNAME:}
      password: ${DBFLOW_NACOS_PASSWORD:}
      config:
        enabled: true
        namespace: ${DBFLOW_NACOS_NAMESPACE:}
        group: DBFLOW_GROUP
        refresh-enabled: true
      discovery:
        enabled: true
        namespace: ${DBFLOW_NACOS_NAMESPACE:}
        group: DBFLOW_GROUP
        service: refinex-dbflow
  # JPA 当前只消费 Flyway 管理后的 schema，不允许 Hibernate 自动建表或改表。
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  # Flyway 默认读取 classpath:db/migration，本处显式记录元数据库迁移入口。
  flyway:
    locations: classpath:db/migration
  # JDK 21 虚拟线程保持显式 opt-in。启用前必须完成容量阈值压测和 pinned thread 观察。
  # threads:
  #   virtual:
  #     enabled: true
  # Spring AI MCP Server 固定能力声明。管理员、target datasource、安全策略等运行配置由 Nacos YAML 提供。
  ai:
    mcp:
      server:
        enabled: true
        name: refinex-dbflow
        version: 0.1.0-SNAPSHOT
        type: SYNC
        protocol: STREAMABLE
        instructions: Refinex-DBFlow MCP server exposes guarded database operation capabilities.
        capabilities:
          tool: true
          resource: true
          prompt: true
        streamable-http:
          mcp-endpoint: /mcp

management:
  metrics:
    tags:
      application: ${spring.application.name}
