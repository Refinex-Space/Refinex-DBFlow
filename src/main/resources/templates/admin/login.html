<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>登录 · Refinex-DBFlow Admin</title>
    <link href="data:," rel="icon">
    <link rel="stylesheet" th:href="@{/admin-assets/css/admin.css}">
    <script defer th:src="@{/admin-assets/js/admin.js}"></script>
</head>
<body>
<section class="login-view">
    <div class="login-visual">
        <div class="login-grid-pattern" aria-hidden="true"></div>
        <div class="login-line login-line-one" aria-hidden="true"></div>
        <div class="login-line login-line-two" aria-hidden="true"></div>
        <div class="login-line login-line-three" aria-hidden="true"></div>
        <div class="login-node login-node-one" aria-hidden="true"></div>
        <div class="login-node login-node-two" aria-hidden="true"></div>
        <div class="login-node login-node-three" aria-hidden="true"></div>
        <div class="login-tile login-tile-one" aria-hidden="true"></div>
        <div class="login-tile login-tile-two" aria-hidden="true"></div>
        <div class="login-tile login-tile-three" aria-hidden="true"></div>
        <div class="login-visual-content">
            <div class="login-brand-lockup">
                <img alt="" aria-hidden="true" class="brand-logo" th:src="@{/admin-assets/img/dbflow-logo.svg}">
                <span>Refinex-DBFlow</span>
            </div>
            <h1>数据库操作治理中心</h1>
            <p>让每一次访问都有授权、边界与审计。</p>
            <div class="login-visual-meta" aria-label="核心边界">
                <span>MCP Gateway</span>
                <span>Audit Ready</span>
            </div>
        </div>
    </div>
    <div class="login-form-panel">
        <button aria-label="切换登录页主题" class="login-theme-toggle" data-theme-toggle type="button">
            <svg aria-hidden="true" class="theme-toggle-icon theme-toggle-moon" fill="none" height="18"
                 viewBox="0 0 24 24" width="18" xmlns="http://www.w3.org/2000/svg">
                <path d="M13.2 3.4A7.9 7.9 0 1 0 20.6 14 6.5 6.5 0 0 1 13.2 3.4Z"
                      stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.7"/>
                <path d="M18.7 3.7v3.2M20.3 5.3h-3.2"
                      stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"/>
            </svg>
            <svg aria-hidden="true" class="theme-toggle-icon theme-toggle-sun" fill="none" height="18"
                 viewBox="0 0 24 24" width="18" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 16.2a4.2 4.2 0 1 0 0-8.4 4.2 4.2 0 0 0 0 8.4Z"
                      stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"/>
                <path d="M12 2.8v2.1M12 19.1v2.1M4.5 4.5 6 6M18 18l1.5 1.5M2.8 12h2.1M19.1 12h2.1M4.5 19.5 6 18M18 6l1.5-1.5"
                      stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"/>
            </svg>
        </button>
        <div class="login-box">
            <div class="login-head">
                <div class="login-kicker">DBFlow Admin</div>
                <h2>登录管理端</h2>
                <p class="muted mt-2">内部系统，请勿暴露到公网。</p>
            </div>
            <form class="login-body" method="post" th:action="@{/login}">
                <div class="notice mb-3" th:if="${param.logout}">已退出管理端。</div>
                <div class="notice bad mb-3" th:if="${param.error}">用户名或密码错误，或账号已停用。</div>
                <div class="notice mb-3" th:unless="${param.error != null || param.logout != null}">
                    会话已过期或首次进入，请使用管理端账号登录。
                </div>
                <div class="field">
                    <label for="username">用户名</label>
                    <input autocomplete="username" autofocus class="control" id="username" name="username"
                           placeholder="请输入管理端账号">
                </div>
                <div class="field">
                    <label for="password">密码</label>
                    <div class="password-field">
                        <input autocomplete="current-password" class="control" id="password" name="password"
                               placeholder="请输入密码" type="password">
                        <button aria-label="显示密码" aria-pressed="false" class="password-toggle"
                                data-password-toggle="#password" type="button">
                            <svg aria-hidden="true" class="eye-icon" fill="none" height="18" viewBox="0 0 24 24"
                                 width="18" xmlns="http://www.w3.org/2000/svg">
                                <path d="M2.5 12s3.4-6 9.5-6 9.5 6 9.5 6-3.4 6-9.5 6-9.5-6-9.5-6Z"
                                      stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                                      stroke-width="1.8"/>
                                <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" stroke="currentColor"
                                      stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"/>
                            </svg>
                            <svg aria-hidden="true" class="eye-off-icon" fill="none" height="18" viewBox="0 0 24 24"
                                 width="18" xmlns="http://www.w3.org/2000/svg">
                                <path d="m3 3 18 18" stroke="currentColor" stroke-linecap="round"
                                      stroke-linejoin="round" stroke-width="1.8"/>
                                <path d="M10.6 10.6A2 2 0 0 0 12 14a2 2 0 0 0 1.4-.6" stroke="currentColor"
                                      stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"/>
                                <path d="M7.2 7.7C4.1 9.2 2.5 12 2.5 12s3.4 6 9.5 6c1.5 0 2.9-.4 4.1-1"
                                      stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                                      stroke-width="1.8"/>
                                <path d="M20.2 15.1A13.3 13.3 0 0 0 21.5 12s-3.4-6-9.5-6c-.9 0-1.8.1-2.6.4"
                                      stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                                      stroke-width="1.8"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <button class="btn primary w-full login-submit" type="submit">登录后台</button>
            </form>
        </div>
    </div>
</section>
</body>
</html>
