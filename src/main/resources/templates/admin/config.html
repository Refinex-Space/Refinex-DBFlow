<!doctype html>
<html lang="zh-CN" th:replace="~{admin/fragments/layout :: layout('配置查看', 'config', ${routeHint}, ~{::section})}"
      xmlns:th="http://www.thymeleaf.org">
<body>
<section>
    <div class="page-head">
        <div><h1>配置查看</h1>
            <p class="muted">展示脱敏后的项目、环境、数据源和执行限制配置。</p></div>
        <a class="btn" th:href="@{/admin/config}">刷新配置</a>
    </div>
    <div class="panel">
        <div class="panel-head"><h2>生效配置</h2><span class="mono muted" th:text="${configPage.sourceLabel}">Local application config</span>
        </div>
        <div class="table-wrap">
            <table th:if="${!configPage.rows.isEmpty()}">
                <thead>
                <tr>
                    <th>项目</th>
                    <th>环境</th>
                    <th>数据源</th>
                    <th>类型</th>
                    <th>主机</th>
                    <th>端口</th>
                    <th>库名</th>
                    <th>用户名</th>
                    <th>执行限制</th>
                    <th>同步状态</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="row : ${configPage.rows}">
                    <td><span th:text="${row.project}">project</span><br><span class="muted"
                                                                               th:text="${row.projectName}">Project</span>
                    </td>
                    <td><span th:text="${row.env}">env</span><br><span class="muted" th:text="${row.envName}">Env</span>
                    </td>
                    <td th:text="${row.datasource}">datasource</td>
                    <td th:text="${row.type}">mysql</td>
                    <td class="mono" th:text="${row.host}">host</td>
                    <td th:text="${row.port}">port</td>
                    <td th:text="${row.schema}">schema</td>
                    <td th:text="${row.username}">username</td>
                    <td class="mono" th:text="${row.limits}">limits</td>
                    <td th:text="${row.syncStatus}">已同步</td>
                </tr>
                </tbody>
            </table>
            <div class="empty" th:if="${configPage.rows.isEmpty()}" th:text="${configPage.emptyHint}">
                当前未配置 dbflow.projects。
            </div>
        </div>
    </div>
    <div class="notice">配置查看页不展示数据库密码、完整 JDBC URL 或 secret。</div>
</section>
</body>
</html>
