# Nacos Data ID: application-dbflow.yml
# Group: DBFLOW_GROUP
# Format: YAML
#
# dev 启动可直接复制本文件到 Nacos。默认管理员：admin / admin。首次登录后请立即修改密码。
# target project/env 由用户按需添加到 dbflow.projects，不再通过一堆示例环境变量间接配置。
#
# 本文件里的“默认”优先指 DBFlow dev 模板默认值；少数 Spring Boot / Hikari 框架默认会在注释中单独说明。
#
# dev 默认值速览：
# - 管理员：admin / admin。首次登录后请立即修改密码。
# - HTTP 监听：127.0.0.1:8080，只允许本机访问。
# - metadata database：本文件显式配置 H2 内存库，仅适合 dev smoke。
# - target project/env：默认空，需要用户按需在 dbflow.projects 添加。
# - DROP_TABLE / DROP_DATABASE：默认 DENY。
# - TRUNCATE：默认 REQUIRE_CONFIRMATION。
# - MCP Origin 校验：默认开启，只信任 localhost/127.0.0.1。
# - MCP request size limit：默认开启，最大 1048576 bytes（1 MiB）。
# - MCP rate limit：默认开启，单来源 120 requests / 1 minute。

# spring.datasource：DBFlow 自己的 metadata database，用于用户、Token、授权、审计、confirmation 等元数据。
# 默认 H2 内存库；应用重启后数据会丢失。需要持久化时改为 MySQL，并让 Flyway 在该库执行 V1 migration。
spring:
  datasource:
    # 默认 H2 MySQL mode；只适合本机 smoke，不适合生产。
    url: jdbc:h2:mem:dbflow_metadata;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    # url: jdbc:mysql://127.0.0.1:3306/dbflow_metadata?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    # 默认 sa；H2 dev 用户名。
    username: sa
    # 默认空；H2 dev 密码。
    password:
    # 默认 org.h2.Driver；改 MySQL metadata database 时改为 com.mysql.cj.jdbc.Driver。
    driver-class-name: org.h2.Driver
    # driver-class-name: com.mysql.cj.jdbc.Driver

# server：DBFlow Web/Admin/MCP HTTP 服务监听配置。
# 若完全不配置 server.address，Spring Boot 会监听所有网卡；dev 模板显式收敛到 127.0.0.1。
server:
  # 默认 127.0.0.1；只允许本机访问。内网部署时改为内网 IP，或继续保持本机监听并放到反向代理后面。
  address: 127.0.0.1
  # 默认 8080；端口冲突时可改，例如 18080。
  port: 8080
  # 默认 framework；让 Spring 读取 X-Forwarded-*，便于后续接 Nginx/TLS 反向代理。
  forward-headers-strategy: framework
  tomcat:
    threads:
      # 默认 200；平台线程模式下限制 Tomcat worker 数。若启用虚拟线程，也不要把容量治理阈值同步放大。
      max: 200
    # 默认 8192；单实例内网部署建议按反向代理和文件描述符预算压测后调整。
    max-connections: 8192
    # 默认 100；连接已满后的 accept 队列，避免流量尖峰直接打爆进程。
    accept-count: 100

# JDK 21 虚拟线程为可选项。启用后 Tomcat 请求处理可使用虚拟线程，但 DBFlow 容量治理、Hikari pool、
# SQL timeout 和 bulkhead 仍然是硬边界；上线前必须同时压测 virtual=false 与 virtual=true。
# spring:
#   threads:
#     virtual:
#       enabled: true

# management：Actuator 暴露面。
# dev 模板只暴露 health、metrics；健康详情默认不公开，避免泄露连接池、数据库等内部信息。
management:
  endpoints:
    web:
      exposure:
        # 默认 health,metrics；不要在内网外暴露 env、beans、configprops 等敏感端点。
        include: health,metrics
  endpoint:
    health:
      # 默认 never；即使调用 /actuator/health，也不返回详细依赖配置。
      show-details: never

# dbflow：DBFlow 自有配置，包含 target datasource、项目环境、策略、初始化管理员和 MCP 安全边界。
dbflow:
  # datasource-defaults：所有 dbflow.projects[].environments[] 可继承的目标库连接默认值。
  # 这里配置的是“被 MCP 操作的业务库”默认连接参数，不是 DBFlow metadata database。
  datasource-defaults:
    # 默认 com.mysql.cj.jdbc.Driver；每个 environment 可用 driver-class-name 单独覆盖。
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 默认 false；为 true 时应用启动会主动连接所有 target database，任一失败会阻断启动。
    validate-on-startup: false
    hikari:
      # 默认 dbflow-target；实际 pool name 会追加 project/env，方便日志和指标定位。
      pool-name-prefix: dbflow-target
      # dev 默认 10；为空时使用 Hikari 默认 maximumPoolSize。
      maximum-pool-size: 10
      # dev 默认 1；必须小于等于 maximum-pool-size。
      # validate-on-startup=false 时，DBFlow 会把实际目标库 pool minimumIdle 降为 0，避免启动后后台连接不可达业务库。
      minimum-idle: 1
      # dev 默认 5s；获取连接等待超过该时间会失败，避免 MCP 客户端在不可达目标库上长时间卡住。
      connection-timeout: 5s
      # dev 默认 10m；空闲连接超过该时间可被回收。
      idle-timeout: 10m
      # dev 默认 30m；连接存活超过该时间会被轮换。
      max-lifetime: 30m

  # projects：DBFlow 可操作的 project/env 清单。
  # 默认 []，即没有任何 target database。用户直接在 Nacos 维护自己的目标库。
  # 字段说明：
  # - key：项目稳定标识，MCP 调用时传 project；全局唯一，必填。
  # - name：管理端展示名，可选。
  # - environments[].key：环境稳定标识，MCP 调用时传 env；同一 project 内唯一，必填。
  # - environments[].name：管理端展示名，可选。
  # - environments[].jdbc-url：目标库 JDBC URL，必填；禁止在 URL 中带 password 参数。
  # - environments[].driver-class-name：可选；为空时继承 datasource-defaults.driver-class-name。
  # - environments[].username/password：目标库账号密码；dev 可明文，内网/生产建议改用 Nacos 加密、环境变量占位或密钥系统。
  #
  # 示例：取消注释后改成自己的库。
  # projects:
  #   - key: your-project
  #     name: Your Project
  #     environments:
  #       - key: dev
  #         name: Dev
  #         jdbc-url: jdbc:mysql://127.0.0.1:3306/your_schema?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
  #         username: your_dbflow_user
  #         password: your_dbflow_password
  projects: [ ]

  # capacity：单实例企业并发治理。它位于 MCP 认证/授权之后、目标库访问和 SQL 执行之前；
  # 用于保护 DBFlow 进程和目标数据库，不替代授权、SQL policy 或审计。
  capacity:
    # 默认 true；关闭后只保留 /mcp 外层 Origin/request-size/source-IP 防护。
    enabled: true
    pressure:
      # 默认 true；基于 JVM、目标 Hikari pool 和拒绝信号判断压力态，不主动探测目标库 SQL。
      enabled: true
      # 默认 1；目标连接池出现等待线程即进入 TARGET_PRESSURE。
      target-pool-waiting-threshold: 1
      # 默认 0.85；active / total 达到阈值即进入 TARGET_PRESSURE。
      target-pool-active-ratio-threshold: 0.85
      # 默认 0.85；JVM used / max 达到阈值即进入 LOCAL_PRESSURE。
      jvm-memory-used-ratio-threshold: 0.85
    rate-limit:
      # 默认每 Token 每分钟 60 次。
      per-token:
        max-requests: 60
        window: 1m
      # 默认每用户每分钟 120 次。
      per-user:
        max-requests: 120
        window: 1m
      # 默认按 MCP 能力类别限流；企业内网部署可按实际压测结果调整。
      per-tool:
        LIGHT_READ:
          max-requests: 180
          window: 1m
        HEAVY_READ:
          max-requests: 60
          window: 1m
        EXPLAIN:
          max-requests: 60
          window: 1m
        EXECUTE:
          max-requests: 30
          window: 1m
    bulkhead:
      # 默认 80；单实例全局并发硬上限。
      global-max-concurrent: 80
      # 默认 100ms；全局获取 permit 的最大等待。
      acquire-timeout: 100ms
      # 默认每 Token 最多 4 个并发，防止单个 Token 占满实例。
      per-token-max-concurrent: 4
      # 默认每用户最多 8 个并发。
      per-user-max-concurrent: 8
      # 默认每 target project/env 最多 6 个并发，避免单库打满影响其他库。
      per-target-max-concurrent: 6
      classes:
        LIGHT_READ:
          max-concurrent: 40
          acquire-timeout: 200ms
        HEAVY_READ:
          max-concurrent: 20
          acquire-timeout: 100ms
        EXPLAIN:
          max-concurrent: 16
          acquire-timeout: 100ms
        EXECUTE:
          # 写路径默认 fail-fast，不排长队。
          max-concurrent: 10
          acquire-timeout: 0ms
    degradation:
      # 默认 true；压力态下对重型只读降级，对 EXPLAIN/EXECUTE 快速拒绝。
      enabled: true
      # 默认 50；schema inspect 等重型只读在压力态下降低返回上限。
      heavy-read-max-items-under-pressure: 50
      # 默认 true；目标或本地压力态下 EXPLAIN 返回容量拒绝。
      reject-explain-under-pressure: true
      # 默认 true；目标或本地压力态下 SQL 执行返回容量拒绝。
      reject-execute-under-pressure: true

  # policies：SQL 风险策略配置。
  policies:
    dangerous-ddl:
      # defaults：未命中 whitelist 时的高危 DDL 默认处置。
      # 可选值：DENY、ALLOW、REQUIRE_CONFIRMATION。dev 模板保持保守默认。
      defaults:
        # 默认 DENY；DROP TABLE 默认拒绝。
        DROP_TABLE: DENY
        # 默认 DENY；DROP DATABASE 默认拒绝。
        DROP_DATABASE: DENY
        # 默认 REQUIRE_CONFIRMATION；TRUNCATE 必须先创建确认挑战。
        TRUNCATE: REQUIRE_CONFIRMATION
      # whitelist：高危 DDL 例外清单，默认 []。
      # DROP_DATABASE 只配置 schema-name，不配置 table-name；DROP_TABLE/TRUNCATE 必须配置 table-name。
      # prod/production 环境额外要求 allow-prod-dangerous-ddl=true，否则即使命中白名单也拒绝。
      whitelist: [ ]

  # admin.initial-user：应用启动时自动创建或补齐的初始管理员。
  # dev 默认启用 admin/admin，降低本地首次启动成本；首次登录后请立即修改密码。
  admin:
    initial-user:
      # 默认 true；改为 false 后不会自动创建初始化管理员。
      enabled: true
      # 默认 admin；管理端登录用户名。
      username: admin
      # 默认 DBFlow Administrator；管理端展示名。
      display-name: DBFlow Administrator
      # 默认 admin；仅适合 dev。内网/生产请改强密码，或改用 password-hash。
      password: admin
      # 可选；配置 BCrypt hash 后可不配置 password。dev 模板默认不启用。
      # password-hash:

  # security：DBFlow 安全边界配置。
  security:
    # mcp-token.pepper：MCP Token hash 加盐材料，只参与服务端 hash，不会返回客户端。
    # 默认 dev-only-change-me 仅适合本机开发；生产必须改成随机长字符串，并通过安全配置注入。
    mcp-token:
      pepper: dev-only-change-me

    # mcp-endpoint：/mcp Streamable HTTP endpoint 的额外保护。
    mcp-endpoint:
      origin:
        # 默认 true；浏览器型客户端带 Origin 时，必须命中 trusted-origins。
        enabled: true
        # 默认仅信任本机访问来源；改域名、端口或反向代理地址后要同步补充。
        trusted-origins:
          - http://127.0.0.1:8080
          - http://localhost:8080
      request-size:
        # 默认 true；避免超大请求体压垮 MCP endpoint。
        enabled: true
        # 默认 1048576；单位 bytes，即 1 MiB，最低允许 1024。
        max-bytes: 1048576
      rate-limit:
        # 默认 true；使用基础固定窗口限流。
        enabled: true
        # 默认 120；同一来源在 window 内最多请求数。
        max-requests: 120
        # 默认 1m；固定窗口长度，支持 5s、1m、10m 等 Spring Duration 写法。
        window: 1m
