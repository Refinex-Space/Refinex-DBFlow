<!doctype html>
<html lang="zh-CN" th:fragment="layout(pageTitle, activeNav, routeHint, content)" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title th:text="${pageTitle} + ' · Refinex-DBFlow Admin'">Refinex-DBFlow Admin</title>
    <link href="data:," rel="icon">
    <link rel="stylesheet" th:href="@{/admin-assets/css/admin.css}">
    <script defer th:src="@{/admin-assets/js/admin.js}"></script>
</head>
<body>
<section class="app">
    <aside class="sidebar">
        <div class="side-brand">
            <img alt="" aria-hidden="true" class="brand-logo" th:src="@{/admin-assets/img/dbflow-logo.svg}">
            <div>
                <div class="side-title">DBFlow Admin</div>
                <div class="side-sub">MCP SQL Gateway</div>
            </div>
        </div>
        <div class="side-nav">
            <div class="nav-group">
                <div class="nav-label">工作台</div>
                <a class="nav-item" th:attr="aria-current=${activeNav == 'overview'} ? 'page' : null"
                   th:classappend="${activeNav == 'overview'} ? ' active'" th:href="@{/admin}">总览</a>
            </div>
            <div class="nav-group">
                <div class="nav-label">身份与访问</div>
                <a class="nav-item" th:classappend="${activeNav == 'users'} ? ' active'"
                   th:attr="aria-current=${activeNav == 'users'} ? 'page' : null"
                   th:href="@{/admin/users}">用户管理</a>
                <a class="nav-item" th:classappend="${activeNav == 'grants'} ? ' active'"
                   th:attr="aria-current=${activeNav == 'grants'} ? 'page' : null"
                   th:href="@{/admin/grants}">项目授权</a>
                <a class="nav-item" th:attr="aria-current=${activeNav == 'tokens'} ? 'page' : null"
                   th:classappend="${activeNav == 'tokens'} ? ' active'" th:href="@{/admin/tokens}">Token
                    管理</a>
            </div>
            <div class="nav-group">
                <div class="nav-label">配置与策略</div>
                <a class="nav-item" th:classappend="${activeNav == 'config'} ? ' active'"
                   th:attr="aria-current=${activeNav == 'config'} ? 'page' : null"
                   th:href="@{/admin/config}">配置查看</a>
                <a class="nav-item" th:classappend="${activeNav == 'policies'} ? ' active'"
                   th:attr="aria-current=${activeNav == 'policies'} ? 'page' : null"
                   th:href="@{/admin/policies/dangerous}">危险策略</a>
            </div>
            <div class="nav-group">
                <div class="nav-label">审计</div>
                <a class="nav-item" th:classappend="${activeNav == 'audit'} ? ' active'"
                   th:attr="aria-current=${activeNav == 'audit' || activeNav == 'audit-detail'} ? 'page' : null"
                   th:href="@{/admin/audit}">审计列表</a>
            </div>
            <div class="nav-group">
                <div class="nav-label">运维</div>
                <a class="nav-item" th:classappend="${activeNav == 'health'} ? ' active'"
                   th:attr="aria-current=${activeNav == 'health'} ? 'page' : null"
                   th:href="@{/admin/health}">系统健康</a>
            </div>
        </div>

        <!-- 侧边栏底部：用户身份与快捷操作 -->
        <div class="side-user-section" id="sideUserSection">
            <div class="side-user-popup" id="sideUserPopup" role="menu" aria-hidden="true">
                <!-- 用户信息头部 -->
                <div class="sup-identity">
                    <span class="sup-avatar"
                          th:text="${shell.adminName != null and !shell.adminName.isEmpty()} ? ${shell.adminName.substring(0,1).toUpperCase()} : 'U'">A</span>
                    <div class="sup-id-info">
                        <span class="sup-id-name" th:text="${shell.adminName}">admin</span>
                        <span class="sup-id-meta">
                            <span th:class="'sup-dot ' + ${shell.mcpTone}"></span>
                            <span th:text="${shell.mcpStatus}">HEALTHY</span>
                            <span class="sup-sep">·</span>
                            <span th:text="${shell.configSourceLabel}">Local</span>
                        </span>
                    </div>
                </div>
                <!-- 主题切换 -->
                <div class="sup-section" role="group" aria-label="切换主题">
                    <button class="sup-menu-item theme-row-item" data-theme-choice="system" aria-pressed="true" type="button">
                        <!-- 电脑图标 -->
                        <svg aria-hidden="true" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                        <span>跟随系统</span>
                        <svg class="sup-check" aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    </button>
                    <button class="sup-menu-item theme-row-item" data-theme-choice="light" aria-pressed="false" type="button">
                        <!-- 太阳图标 -->
                        <svg aria-hidden="true" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                        <span>亮色</span>
                        <svg class="sup-check" aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    </button>
                    <button class="sup-menu-item theme-row-item" data-theme-choice="dark" aria-pressed="false" type="button">
                        <!-- 月亮图标 -->
                        <svg aria-hidden="true" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                        <span>暗色</span>
                        <svg class="sup-check" aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    </button>
                </div>
                <!-- 退出 -->
                <div class="sup-section sup-section-last">
                    <form method="post" th:action="@{/logout}" style="margin:0">
                        <button class="sup-menu-item sup-logout" type="submit">
                            <svg aria-hidden="true" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                            <span>退出登录</span>
                        </button>
                    </form>
                </div>
            </div>
            <button aria-expanded="false" aria-haspopup="true" class="side-user-btn" id="sideUserBtn" type="button">
                <span class="user-avatar"
                      th:text="${shell.adminName != null and !shell.adminName.isEmpty()} ? ${shell.adminName.substring(0,1).toUpperCase()} : 'U'">A</span>
                <div class="user-info">
                    <span class="user-name" th:text="${shell.adminName}">admin</span>
                    <span class="user-role">管理员</span>
                </div>
                <svg aria-hidden="true" class="user-chevron" fill="none" height="14" stroke="currentColor"
                     stroke-width="2" viewBox="0 0 24 24" width="14" xmlns="http://www.w3.org/2000/svg">
                    <polyline points="18 15 12 9 6 15"></polyline>
                </svg>
            </button>
        </div>
    </aside>

    <main class="main">
        <div class="content">
            <th:block th:replace="${content}"></th:block>
        </div>
    </main>
</section>
<div aria-hidden="true" class="drawer-overlay" id="drawerOverlay"></div>
<div class="toast-stack" id="toastStack" aria-live="polite" aria-atomic="false"></div>
<div hidden id="flashData"
     th:attr="data-success=${successMessage},data-error=${errorMessage}"></div>
</body>
</html>
