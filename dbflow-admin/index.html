<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <link
            href="/images/favicon.svg"
            media="(prefers-color-scheme: light)"
            rel="icon"
            type="image/svg+xml"
    />
    <link
            href="/images/favicon_light.svg"
            media="(prefers-color-scheme: dark)"
            rel="icon"
            type="image/svg+xml"
    />
    <link
            href="/images/favicon.png"
            media="(prefers-color-scheme: light)"
            rel="icon"
            type="image/png"
    />
    <link
            href="/images/favicon_light.png"
            media="(prefers-color-scheme: dark)"
            rel="icon"
            type="image/png"
    />
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>

    <!-- Primary Meta Tags -->
    <title>Shadcn Admin</title>
    <meta content="Shadcn Admin" name="title"/>
    <meta
            content="Admin Dashboard UI built with Shadcn and Vite."
            name="description"
    />

    <!-- Open Graph / Facebook -->
    <meta content="website" property="og:type"/>
    <meta content="https://shadcn-admin.netlify.app" property="og:url"/>
    <meta content="Shadcn Admin" property="og:title"/>
    <meta
            content="Admin Dashboard UI built with Shadcn and Vite."
            property="og:description"
    />
    <meta
            content="https://shadcn-admin.netlify.app/images/shadcn-admin.png"
            property="og:image"
    />

    <!-- Twitter -->
    <meta content="summary_large_image" property="twitter:card"/>
    <meta content="https://shadcn-admin.netlify.app" property="twitter:url"/>
    <meta content="Shadcn Admin" property="twitter:title"/>
    <meta
            content="Admin Dashboard UI built with Shadcn and Vite."
            property="twitter:description"
    />
    <meta
            content="https://shadcn-admin.netlify.app/images/shadcn-admin.png"
            property="twitter:image"
    />

    <!-- font family -->
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect"/>
    <link
            href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&display=swap"
            rel="stylesheet"
    />

    <meta content="#fff" name="theme-color"/>
</head>

<body>
<div id="root"></div>
<script src="/src/main.tsx" type="module"></script>
</body>
</html>
