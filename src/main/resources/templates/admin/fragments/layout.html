<!doctype html>
<html lang="zh-CN" th:fragment="layout(pageTitle, activeNav, routeHint, content)" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title th:text="${pageTitle} + ' · Refinex-DBFlow Admin'">Refinex-DBFlow Admin</title>
    <link href="data:," rel="icon">
    <link rel="stylesheet" th:href="@{/admin-assets/css/admin.css}">
    <script defer th:src="@{/admin-assets/js/admin.js}"></script>
</head>
<body>
<section class="app">
    <aside class="sidebar">
        <div class="side-brand">
            <span class="brand-mark">DB</span>
            <div>
                <div class="side-title">DBFlow Admin</div>
                <div class="side-sub">MCP SQL Gateway</div>
            </div>
        </div>
        <div class="nav-group">
            <div class="nav-label">工作台</div>
            <a class="nav-item" th:classappend="${activeNav == 'overview'} ? ' active'" th:href="@{/admin}">总览</a>
        </div>
        <div class="nav-group">
            <div class="nav-label">身份与访问</div>
            <a class="nav-item" th:classappend="${activeNav == 'users'} ? ' active'"
               th:href="@{/admin/users}">用户管理</a>
            <a class="nav-item" th:classappend="${activeNav == 'grants'} ? ' active'"
               th:href="@{/admin/grants}">项目环境授权</a>
            <a class="nav-item" th:classappend="${activeNav == 'tokens'} ? ' active'" th:href="@{/admin/tokens}">Token
                管理</a>
        </div>
        <div class="nav-group">
            <div class="nav-label">配置与策略</div>
            <a class="nav-item" th:classappend="${activeNav == 'config'} ? ' active'"
               th:href="@{/admin/config}">配置查看</a>
            <a class="nav-item" th:classappend="${activeNav == 'policies'} ? ' active'"
               th:href="@{/admin/policies/dangerous}">危险策略</a>
        </div>
        <div class="nav-group">
            <div class="nav-label">审计</div>
            <a class="nav-item" th:classappend="${activeNav == 'audit'} ? ' active'"
               th:href="@{/admin/audit}">审计列表</a>
            <a class="nav-item" th:classappend="${activeNav == 'audit-detail'} ? ' active'" th:href="@{/admin/audit}">审计详情</a>
        </div>
        <div class="nav-group">
            <div class="nav-label">运维</div>
            <a class="nav-item" th:classappend="${activeNav == 'health'} ? ' active'"
               th:href="@{/admin/health}">系统健康</a>
        </div>
    </aside>

    <main class="main">
        <header class="topbar">
            <div class="top-search muted">DBFlow 管理端</div>
            <div class="top-meta">
                <span th:class="'status ' + ${shell.mcpTone}" th:text="${shell.mcpStatus}">HEALTHY</span>
                <span class="status neutral">ADMIN</span>
                <span th:text="'配置源：' + ${shell.configSourceLabel}">配置源：Local application config</span>
                <span th:text="'管理员：' + ${shell.adminName}">管理员：-</span>
                <form method="post" th:action="@{/logout}">
                    <button class="btn" type="submit">退出</button>
                </form>
            </div>
        </header>

        <div class="content">
            <div class="route-hint">
                <span class="mono" th:text="${routeHint}">route=/admin</span>
                <span>Spring MVC + Thymeleaf 管理端视图。</span>
            </div>
            <th:block th:replace="${content}"></th:block>
        </div>
    </main>
</section>
</body>
</html>
